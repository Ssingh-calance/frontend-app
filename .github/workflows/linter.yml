# This workflow executes several linters on changed files based on languages used in your code base whenever
# you push a code or open a pull request.
#
# You can adjust the behavior by modifying this file.
# For more information, see:
# https://github.com/github/super-linter
name: Lint Code Base

on:
  pull_request:
    branches: ["main", "dev", "release-*"]

permissions:
  contents: read
  pull-requests: write
  statuses: write

jobs:
  run-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          # Full git history is needed to get a proper list of changed files within `super-linter`
          fetch-depth: 0
          persist-credentials: false

      - name: Lint Code Base
        uses: super-linter/super-linter/slim@v8.5.0
        env:
          VALIDATE_ALL_CODEBASE: false
          DEFAULT_BRANCH: "main"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VALIDATE_GITHUB_ACTIONS: false
          VALIDATE_GITHUB_ACTIONS_ZIZMOR: false
          VALIDATE_MARKDOWN: false
          VALIDATE_BIOME_FORMAT: false

      - name: Close PR when linter fails
        if: failure()
        uses: satya-500/github-action-close-pull@v1
        with:
          comment: "Closing the PR as linter is failing. Resolve the linting issues and then, raise the PR again."
          pull-request-number: ${{ github.event.number }}
